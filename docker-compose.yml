services:
  tidalcordrs:
    image: ghcr.io/mrspookyangel/tidalcordrs:latest
    container_name: tidalcordrs
    restart: unless-stopped
    environment:
      # Credentials (change this)
      - DISCORD_TOKEN=${DISCORD_TOKEN:?DISCORD_TOKEN is required}

      # Runtime configuration
      - CONFIG_PATH
      - TZ=${TZ:-UTC}

      # Optional Portainer / Docker env overrides
      - TIDALCORDRS_COMMAND_PREFIX
      - TIDALCORDRS_BOT_PROFILE__SYNC_ENABLED
      - TIDALCORDRS_BOT_PROFILE__NAME
      - TIDALCORDRS_BOT_PROFILE__AVATAR_PATH
      - TIDALCORDRS_BOT_PROFILE__STATE_PATH
      - TIDALCORDRS_TECHNICAL__SPOOL_READ_AHEAD_MIB
      - TIDALCORDRS_TECHNICAL__COLLECTION_TRACK_FETCH_CONCURRENCY
      - TIDALCORDRS_TIDAL__TOKEN_SESSION_PATH
      - TIDALCORDRS_TIDAL__CLIENT_ID
      - TIDALCORDRS_TIDAL__CLIENT_SECRET
      - TIDALCORDRS_TIDAL__USER_AGENT
      - TIDALCORDRS_TIDAL__OAUTH_DEVICE_AUTH_URL
      - TIDALCORDRS_TIDAL__OAUTH_TOKEN_URL
      - TIDALCORDRS_TIDAL__SESSIONS_URL
      - TIDALCORDRS_TIDAL__SEARCH_URL

      # Legacy env overrides remain supported
      - COMMAND_PREFIX
      - BOT_PROFILE_SYNC_ENABLED
      - BOT_NAME
      - BOT_AVATAR_PATH
      - BOT_PROFILE_STATE_PATH
      - SPOOL_READ_AHEAD_MIB
      - COLLECTION_TRACK_FETCH_CONCURRENCY
      - TIDAL_TOKEN_SESSION_PATH
      - TIDAL_CLIENT_ID
      - TIDAL_CLIENT_SECRET
      - USER_AGENT
      - OAUTH_DEVICE_AUTH_URL
      - OAUTH_TOKEN_URL
      - SESSIONS_URL
      - SEARCH_URL
    volumes:
      - app-data:/app/data
      # To use a mounted TOML config, set CONFIG_PATH=/app/config/config.toml
      # and uncomment the next line.
      # - ./config.toml:/app/config/config.toml:ro

volumes:
  app-data:
