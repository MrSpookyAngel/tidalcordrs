name: Release

on:
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"

jobs:
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      is_new: ${{ steps.check.outputs.is_new }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump
        id: check
        run: |
          # Extract version from Cargo.toml
          VERSION=$(grep '^version' Cargo.toml | head -n 1 | awk -F '"' '{print $2}')
          TAG_NAME="v$VERSION"

          echo "Found version: $VERSION"

          # Check if a tag for this version already exists
          if git show-ref --tags --verify --quiet "refs/tags/$TAG_NAME"; then
            echo "Tag $TAG_NAME already exists. Skipping release."
            echo "is_new=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG_NAME does not exist. Proceeding with release."
            echo "is_new=true" >> "$GITHUB_OUTPUT"
            echo "version=$TAG_NAME" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build on ${{ matrix.os }}
    needs: check-version
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set universal arch and set CMAKE version minimum (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          echo "CMAKE_OSX_ARCHITECTURES=x86_64;arm64" >> $GITHUB_ENV
          echo "CMAKE_POLICY_VERSION_MINIMUM=3.5" >> $GITHUB_ENV

      - name: Build release
        run: cargo build --release

      - name: Package artifacts
        run: |
          mkdir artifacts

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            osname="windows"
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            osname="macos"
          else
            osname="linux"
          fi

          version="${{ needs.check-version.outputs.version }}"

          if [ "$osname" = "windows" ]; then
            for f in target/release/*.exe; do
              cp "$f" "artifacts/tidalcordrs-$version-$osname.exe"
            done
          else
            for f in target/release/*; do
              if [ -f "$f" ] && [ -x "$f" ]; then
                cp "$f" "artifacts/tidalcordrs-$version-$osname"
              fi
            done
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-binaries
          path: artifacts/*

  release:
    name: Create GitHub Release
    needs: [check-version, build]
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: Release ${{ needs.check-version.outputs.version }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build and Push Docker Image
    needs: [check-version, release]
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase repo name
        run: |
          echo "repo_lowercase=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.repo_lowercase }}:latest
            ghcr.io/${{ env.repo_lowercase }}:${{ needs.check-version.outputs.version }}
